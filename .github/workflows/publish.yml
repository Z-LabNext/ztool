name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 安装 pnpm
      - uses: pnpm/action-setup@v3
        with:
          version: 9 # 建议固定版本，便于 CI 一致

      # 设置 Node 环境
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # 安装依赖
      - run: pnpm install

      # 构建
      - run: pnpm run build

      # 测试
      - run: pnpm test

      # 调试：验证 npm 认证状态
      - name: Debug npm auth
        run: |
          echo "NPM_TOKEN length: ${#NPM_TOKEN}"
          npm whoami || echo "whoami failed"
          npm ping || echo "ping failed"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 发布到 npm（pnpm 原生支持 NPM_TOKEN 环境变量）
      - run: pnpm publish --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
